# SCENARIO: Orders GraphQL mutations
# TYPE: graphql
# VERSION: 1.0

CONFIG[1]{key, value}:
  endpoint, http://localhost:8000/graphql

QUERY[1]{name, body, variables}:
  listOrders, "query { orders { id total } }", ""

MUTATION[2]{name, body, variables}:
  createOrder, "mutation { createOrder(total: 99.5) { id } }", ""
  cancelOrder, "mutation($id: ID!) { cancelOrder(id: $id) { id } }", "{id: '1'}"

SUBSCRIPTION[1]{name, body, variables}:
  newOrders, "subscription { newOrders { id total } }", ""

ASSERT[2]{path, op, expected}:
  data.orders.length, >=, 0
  data.createOrder.id, !=, null
