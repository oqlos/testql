# SCENARIO: Orders event stream contract
# TYPE: proto
# VERSION: 1.0

PROTO[1]{file}:
  schemas/orders/events.proto

MESSAGE[3]{name, fields}:
  OrderCreated, "order_id:int64=1, user_id:int64=42, total:double=99.5"
  OrderPaid, "order_id:int64=1, paid_at:int64=1700000000"
  OrderCancelled, "order_id:int64=1, reason:string=test"

ASSERT[3]{name, check}:
  OrderCreated, round_trip_equal
  OrderPaid, round_trip_equal
  OrderCancelled, round_trip_equal
