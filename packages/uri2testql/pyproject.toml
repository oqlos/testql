[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2testql"
version = "0.1.0"
description = "testql:// URI driver for TestQL manifests"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "testql>=1.2.0",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
