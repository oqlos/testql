[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "desktop2testql"
version = "0.1.0"
description = "Native desktop control backend (X11/Wayland) for TestQL DESKTOP_* commands"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "testql>=1.2.63",
]

[project.optional-dependencies]
control = [
    # Host tools (wmctrl, xdotool, wtype, ydotool, grim) are system packages.
    "pyautogui>=0.9.54",
    "mss>=9.0",
    "opencv-python-headless>=4.8",
    "dogtail>=0.9.11; platform_system=='Linux'",
    "pynput>=1.7",
]
vision = [
    "img2nl[analyze,similarity,opencv,scan]>=0.1.2",
    "imgl>=0.7.2",
    "vdisplay[pillow]>=0.1.3; platform_system=='Linux'",
    "pytesseract>=0.3.10",
]

[tool.setuptools.packages.find]
where = ["src"]
