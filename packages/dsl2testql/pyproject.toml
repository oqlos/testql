[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsl2testql"
version = "0.1.0"
description = "TestQL control DSL — query, patch, validate and generate test scenarios"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "testql>=1.2.0",
    "protobuf>=4.21",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
dsl2testql = "dsl2testql.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"dsl2testql" = ["schema/commands/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
