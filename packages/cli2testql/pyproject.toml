[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli2testql"
version = "0.1.0"
description = "Interactive CLI shell for TestQL control DSL"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "testql>=1.2.0",
    "dsl2testql>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
cli2testql = "cli2testql.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
