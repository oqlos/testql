[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp2testql"
version = "0.1.0"
description = "MCP server for TestQL control (query, patch, validate, DSL)"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "testql>=1.2.0",
    "dsl2testql>=0.1.0",
    "uri2testql>=0.1.0",
    "nlp2testql>=0.1.0",
    "mcp>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
mcp2testql = "mcp2testql.cli:main"
mcp2testql-mcp = "mcp2testql.server:run_server"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
