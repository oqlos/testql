# SCENARIO: Encoder CLI Hardware Simulation — Full Navigation Flow
# TYPE: encoder
# DESCRIPTION: Simulates hardware encoder navigation through encoder commands
# VERSION: 1.0
# REQUIRES: encoder-control service on port 8105

# ── Configuration ──────────────────────────────────────
CONFIG[4]{key, value}:
  base_url, http://localhost:8105
  encoder_url, http://localhost:8105
  wait_zone_change, 300
  timeout_ms, 10000

# ── Initialize Encoder Mode ───────────────────────────
ENCODER[1]{action, target, value, wait_ms}:
  on, -, -, 500

# ── Navigate Column 1 (Menu) via Encoder ───────────────
ENCODER[4]{action, target, value, wait_ms}:
  focus, col1, -, 300
  scroll, -, 1, 200
  scroll, -, 1, 200
  click, -, -, 500

# ── Navigate Column 2 (Submenu) via Encoder ────────────
ENCODER[4]{action, target, value, wait_ms}:
  focus, col2, -, 300
  scroll, -, 1, 200
  scroll, -, -1, 200
  click, -, -, 500

# ── Table Navigation via Encoder ────────────────────────
ENCODER[6]{action, target, value, wait_ms}:
  focus, col3, -, 300
  scroll, -, 1, 200
  scroll, -, 1, 200
  dblclick, -, -, 400
  scroll, -, -1, 200
  click, -, -, 400

# ── Check Status ──────────────────────────────────────
ENCODER[1]{action, target, value, wait_ms}:
  status, -, -, 300

# ── Deactivate Encoder ────────────────────────────────
ENCODER[1]{action, target, value, wait_ms}:
  off, -, -, 300
