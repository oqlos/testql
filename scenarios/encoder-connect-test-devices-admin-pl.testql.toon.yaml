# SCENARIO: Connect Test Devices — Encoder Mode (PL admin)
# TYPE: gui
# VERSION: 1.0

CONFIG[4]{key, value}:
  base_url, http://localhost:8100
  encoder_url, http://localhost:8105
  encoder_endpoint_prefix, /dashboard/action
  headless, false

NAVIGATE[1]{path, wait_ms}:
  /connect-test/devices?font=default&theme=dark&role=admin&lang=pl&size=1280, 800

FLOW[1]{command, target, value}:
  click, #encoder-mode-btn, -

WAIT[1]{ms}:
  300

ENCODER[6]{action, target, value, wait_ms}:
  on, -, -, 200
  status, -, -, 200
  focus, col3, -, 200
  scroll, -, 3, 200
  click, -, -, 200
  status, -, -, -

ASSERT[1]{field, op, expected}:
  _encoder_status.error, !=, no_response
