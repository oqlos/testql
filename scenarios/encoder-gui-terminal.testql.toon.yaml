# SCENARIO: Encoder GUI Terminal — Browser-based Testing
# TYPE: encoder-gui
# DESCRIPTION: Tests encoder terminal via browser GUI
# VERSION: 1.0
# REQUIRES: encoder-control service on port 8105, Playwright

# ── Configuration ──────────────────────────────────────
CONFIG[3]{key, value}:
  base_url, http://localhost:8105
  encoder_url, http://localhost:8105
  timeout_ms, 3000

# ── Navigate to Encoder Test Page ──────────────────────
NAVIGATE[1]{path, wait_ms}:
  /c2004-test, 2000

# ── Wait for Terminal Initialization ──────────────────
WAIT[1]{duration_ms}:
  1000

# ── Test Terminal Help Command ─────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", h, 300

WAIT[1]{duration_ms}:
  500

# ── Test Activate Command (a) ───────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", a, 300

WAIT[1]{duration_ms}:
  500

# ── Test Status Command (st) ───────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", st, 300

WAIT[1]{duration_ms}:
  500

# ── Test Focus Command (f col3) ────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", f col3, 300

WAIT[1]{duration_ms}:
  500

# ── Test Scroll Command (s 1) ──────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", s 1, 300

WAIT[1]{duration_ms}:
  500

# ── Test Click Command (c) ─────────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", c, 300

WAIT[1]{duration_ms}:
  500

# ── Test Page Next Command (n) ─────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", n, 300

WAIT[1]{duration_ms}:
  500

# ── Test Page Prev Command (p) ─────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", p, 300

WAIT[1]{duration_ms}:
  500

# ── Test Deactivate Command (d) ────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "#terminal-input", d, 300

WAIT[1]{duration_ms}:
  500
