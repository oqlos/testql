# SCENARIO: Encoder GUI Full Flow — Complete Navigation via Terminal
# TYPE: encoder-gui
# DESCRIPTION: Full encoder navigation flow through browser terminal
# VERSION: 1.0
# REQUIRES: encoder-control service on port 8105, Playwright

# ── Configuration ──────────────────────────────────────
CONFIG[4]{key, value}:
  base_url, http://localhost:8105
  encoder_url, http://localhost:8105
  wait_zone_change, 300
  timeout_ms, 10000

# ── Navigate to Encoder Test Page ──────────────────────
NAVIGATE[1]{path, wait_ms}:
  /c2004-test, 2000

# ── Wait for Terminal Initialization ──────────────────
WAIT[1]{duration_ms}:
  1000

# ── Initialize Encoder Mode ───────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", a, 300

WAIT[1]{duration_ms}:
  500

# ── Navigate Column 1 (Menu) via Terminal ──────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", f col1, 300

WAIT[1]{duration_ms}:
  300

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s 1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s 1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", c, 300

WAIT[1]{duration_ms}:
  500

# ── Navigate Column 2 (Submenu) via Terminal ────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", f col2, 300

WAIT[1]{duration_ms}:
  300

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s 1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s -1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", c, 300

WAIT[1]{duration_ms}:
  500

# ── Navigate to Data Module ───────────────────────────
NAVIGATE[1]{path, wait_ms}:
  /connect-data, 1000

# ── Table Navigation via Terminal ──────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", f col3, 300

WAIT[1]{duration_ms}:
  300

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s 1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s 1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", x, 400

WAIT[1]{duration_ms}:
  400

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", s -1, 200

WAIT[1]{duration_ms}:
  200

GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", c, 400

WAIT[1]{duration_ms}:
  400

# ── Check Status ──────────────────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", st, 300

WAIT[1]{duration_ms}:
  500

# ── Deactivate Encoder ────────────────────────────────
GUI_INPUT[1]{selector, value, wait_ms}:
  "input[placeholder*='encoder>']", d, 300

WAIT[1]{duration_ms}:
  500

# ── Verify Terminal Output Contains Encoder ────────────
GUI_ASSERT_TEXT[1]{selector, condition, expected}:
  ".terminal-output", contains, "encoder"
