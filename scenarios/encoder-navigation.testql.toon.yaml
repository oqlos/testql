# SCENARIO: Encoder Navigation Test — Hardware Navigation Simulation
# TYPE: encoder
# DESCRIPTION: Simulates hardware encoder navigation through c2004 UI
# VERSION: 1.0
# REQUIRES: encoder-control service on port 8105

# ── Configuration ──────────────────────────────────────
CONFIG[3]{key, value}:
  base_url, http://localhost:8100
  encoder_url, http://localhost:8105
  wait_zone_change, 300

# ── Initialize Encoder ────────────────────────────────
NAVIGATE[1]{path, wait_ms}:
  /connect-id, 1000

ENCODER[1]{action, target, value, wait_ms}:
  on, -, -, 500

# ── Navigate Column 1 (Menu) ──────────────────────────
ENCODER[4]{action, target, value, wait_ms}:
  focus, col1, -, 300
  scroll, -, 1, 200
  scroll, -, 1, 200
  click, -, -, 500

# ── Navigate Column 2 (Submenu) ──────────────────────
ENCODER[4]{action, target, value, wait_ms}:
  focus, col2, -, 300
  scroll, -, 1, 200
  scroll, -, -1, 200
  click, -, -, 500

# ── Navigate to Data Module ───────────────────────────
NAVIGATE[1]{path, wait_ms}:
  /connect-data, 800

# ── Table Navigation via Encoder ──────────────────────
ENCODER[6]{action, target, value, wait_ms}:
  focus, col3, -, 300
  scroll, -, 1, 200
  scroll, -, 1, 200
  dblclick, -, -, 400
  scroll, -, -1, 200
  click, -, -, 400

# ── Status Check ──────────────────────────────────────
ENCODER[2]{action, target, value, wait_ms}:
  status, -, -, -
  off, -, -, 300
