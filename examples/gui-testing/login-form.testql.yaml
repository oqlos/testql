scenario: Login Form Test
type: gui
version: 2

targets:
  browser:
    base_url: https://example.com
    engine: chromium
    headless: true

vars:
  username: testuser
  password: testpass123

steps:
  - open: ${browser.base_url}/login
    wait: 500ms

  - input: "#username"
    value: ${username}

  - input: "#password"
    value: ${password}

  - click: "button[type='submit']"
    wait: 1000ms

  - expect:
      visible: "[data-testid='dashboard']"

  - expect:
      text:
        selector: h1
        equals: "Welcome, ${username}"
