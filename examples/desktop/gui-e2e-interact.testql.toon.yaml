# SCENARIO: gui-e2e-interact — focus Toolbox, mirror capture, OCR assert
name: gui-e2e-interact
description: Focus app window, vdisplay mirror capture, assert visible text via imgl

DESKTOP[6]{command,args}:
  DESKTOP_ASSERT_WINDOW,Toolbox
  DESKTOP_CAPTURE,examples/desktop/interact-shot.png primary
