# SCENARIO: CRUD Workflow Test
# TYPE: api
# VERSION: 1.0

CONFIG[2]{key, value}:
  base_url, http://localhost:8101
  timeout_ms, 5000

# CREATE
API[1]{method, endpoint, expected_status}:
  POST, ${base_url}/api/v3/scenarios, 201

ASSERT[1]{field, operator, expected}:
  data.id, !=, null

# Capture the created ID for later use
CAPTURE scenario_id FROM "data.id"

# READ
API[1]{method, endpoint, expected_status}:
  GET, ${base_url}/api/v3/scenarios/${scenario_id}, 200

ASSERT[1]{field, operator, expected}:
  data.id, ==, ${scenario_id}

# UPDATE
API[1]{method, endpoint, expected_status}:
  PUT, ${base_url}/api/v3/scenarios/${scenario_id}, 200

# DELETE
API[1]{method, endpoint, expected_status}:
  DELETE, ${base_url}/api/v3/scenarios/${scenario_id}, 204
