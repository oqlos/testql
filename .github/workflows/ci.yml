name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: >
          pip install
          -e packages/graphql2testql
          -e packages/proto2testql
          -e packages/sql2testql
          -e packages/desktop2testql
      - run: pytest --cov=testql --cov-report=xml
      - run: bash examples/run-all.sh
